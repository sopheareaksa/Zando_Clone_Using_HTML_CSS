<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zando Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bd1">
    <div class="form-container">
        <div class="title">
            <h4>LOGIN</h4>
            <h4>REGISTER</h4>
        </div>
        <hr style="width: 350px; margin-left: 20px;">
        <div class="form">
            <label for="mobile">Mobile Number</label>
            <input id="mobile" type="email" placeholder="Enter phone number">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password">
            <button type="button">LOGIN</button>
            <label class="forgot">Forgot your password?</label>
            <label class="forgot">OR</label>
        </div>
        <div class="button">
            <button type="button"><img src="https://cdn-icons-png.flaticon.com/128/300/300221.png" alt="Google">Continue with Google</button>
            <button type="button"><img src="https://cdn-icons-png.flaticon.com/128/15047/15047435.png" alt="Facebook">Continue with Facebook</button>
        </div>
        <label class="new">New to ZANDO? <a href="./register.html">Register</a></label>
    </div>

</body>
</html>
