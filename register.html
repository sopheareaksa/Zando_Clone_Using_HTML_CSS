<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zando Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bd1">
    <div class="form-container">
        <div class="title">
            <h4>LOGIN</h4>
            <h4>REGISTER</h4>
        </div>
        <hr style="width: 350px; margin-left: 20px;">
        <div class="required">
            <label>Gender(Required)</label>
            <input class="radio" type="radio" id="male" name="gender"><label for="male">Male</label>
            <input class="radio" type="radio" id="female" name="gender"><label for="female">Female</label>
        </div>
        <div class="form1">
            <div class="input-box">
                <label for="first_name">First Name</label>
                <input id="first_name" type="text" placeholder="Enter first name">
            </div>
            <div class="input-box">
                <label for="last_name">Last Name</label>
                <input id="last_name" type="text" placeholder="Enter last name">
            </div>
        </div>
        <div class="form">
            <label for="reg_mobile">Mobile Number</label>
            <input id="reg_mobile" type="email" placeholder="Enter phone number">
            <label for="reg_password">Password</label>
            <input id="reg_password" type="password" placeholder="Enter password">
            <button type="button">CREATE ACCOUNT</button>
            <label class="forgot">OR</label>
        </div>
        <div class="button">
            <button type="button"><img src="https://cdn-icons-png.flaticon.com/128/300/300221.png" alt="Google">Continue with Google</button>
            <button type="button"><img src="https://cdn-icons-png.flaticon.com/128/15047/15047435.png" alt="Facebook">Continue with Facebook</button>
        </div>
        <label class="new">Already have an account? <a href="./login.html">Login</a></label>
    </div>

</body>
</html>
